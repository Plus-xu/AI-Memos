<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>AI-MEMOS</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body class="body">
    <div class="title" id="opensite">
      <img src="assets/logo_24x24.png" alt="MEMOS Logo" class="title-logo">
      <span>AI-MEMOS</span>
    </div>
    <!-- 主题切换按钮 Theme Toggle Button -->
    <div id="theme_toggle" title="">
      <img src="assets/sun.svg" class="theme-icon theme-icon-light" alt="Light Theme">
      <img src="assets/moon.svg" class="theme-icon theme-icon-dark" alt="Dark Theme">
      <img src="assets/sun-moon.svg" class="theme-icon theme-icon-auto" alt="Auto Theme">
    </div>
    <!-- 设置按钮 Settings Button -->
    <div id="blog_info_edit" title="">
      <img src="assets/settings.svg" alt="Settings">
    </div>
    <div id="blog_info" class="">
        <input
          id="apiUrl"
          class="inputer"
          name="apiUrl"
          type="text"
          value=""
          maxlength="245"
          placeholder=""
          required
        />
        <input
          id="apiTokens"
          class="inputer"
          name="apiTokens"
          type="text"
          value=""
          maxlength="245"
          placeholder=""
          required
        />
        <!-- 语言选择器 -->
        <div class="language-selector">
          <label for="languageSelect" id="languageLabel"></label>
          <select id="languageSelect" class="inputer">
            <option value="en">English</option>
            <option value="zh_CN">简体中文</option>
            <option value="ja">日本語</option>
          </select>
        </div>
        
        <!-- AI 优化配置 -->
        <div class="ai-config-section">
          <label for="llmProvider" id="llmProviderLabel" class="config-label"></label>
          <select id="llmProvider" class="inputer">
            <option value="openai">OpenAI</option>
            <option value="deepseek">DeepSeek</option>
            <option value="gemini">Gemini</option>
            <option value="anthropic">Anthropic</option>
            <option value="newapi">New API</option>
          </select>
          
          <label for="llmModel" id="llmModelLabel" class="config-label"></label>
          <select id="llmModel" class="inputer">
            <!-- 动态填充 -->
          </select>
          
          <input
            id="llmCustomModel"
            class="inputer"
            name="llmCustomModel"
            type="text"
            value=""
            maxlength="100"
            placeholder=""
            style="display: none;"
          />

          <label for="llmBaseUrl" id="llmBaseUrlLabel" class="config-label" style="display: none;"></label>
          <input
            id="llmBaseUrl"
            class="inputer"
            name="llmBaseUrl"
            type="text"
            value=""
            maxlength="245"
            placeholder=""
            style="display: none;"
          />
          
          <label for="llmApiKey" id="llmApiKeyLabel" class="config-label"></label>
          <input
            id="llmApiKey"
            class="inputer"
            name="llmApiKey"
            type="password"
            value=""
            maxlength="200"
            placeholder=""
          />

          <div class="quick-preset-section">
            <label id="llmQuickPresetsLabel" class="config-label"></label>
            <div id="quickPresetRows" class="quick-preset-rows"></div>
          </div>
        </div>
        
        <span id="saveKey" class="action-btn confirm-btn"></span>
    </div>

    <div class="memo-editor">
      <textarea
        class="common-editor-inputer"
        rows="4"
        name="text"
        id="content"
        placeholder=""
        required=""
      ></textarea>
    </div>

    <div class="create-options" id="createOptions">
      <label class="create-option-toggle" for="memoPinned">
        <input id="memoPinned" type="checkbox" />
        <span id="memoPinnedLabel"></span>
      </label>
      <label class="create-option-toggle" for="memoCreateTimeEnabled">
        <input id="memoCreateTimeEnabled" type="checkbox" />
        <span id="memoCreateTimeLabel"></span>
      </label>
      <input id="memoCreateTime" class="create-option-datetime" type="datetime-local" />
    </div>

  <div class="common-tools-wrapper">
    <div class="common-tools-container">
      <div id="tags" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" x2="20" y1="9" y2="9"/>
          <line x1="4" x2="20" y1="15" y2="15"/>
          <line x1="10" x2="8" y1="3" y2="21"/>
          <line x1="16" x2="14" y1="3" y2="21"/>
        </svg>
      </div>
      <div id="newtodo" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10.656V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12.344"/>
          <path d="m9 11 3 3L22 4"/>
        </svg>
      </div>
      <div id="upres" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/>
        </svg>
      </div>
      <div id="getlink" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <div id="shortcuts" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M7 12h10"/>
          <path d="M10 18h4"/>
        </svg>
      </div>
      <div id="random" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
          <path d="M16 8h.01"/>
          <path d="M12 12h.01"/>
          <path d="M8 16h.01"/>
        </svg>
      </div>
      <div id="search" class="tool-icon" title="">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m21 21-4.34-4.34"/>
          <circle cx="11" cy="11" r="8"/>
        </svg>
      </div>
      <div class="selector-wrapper visibility-selector ">
        <div id="lock" class="current-value-container active false">
          <span id="lock-now" class="value-text"></span><span class="arrow-text"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-img"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
        </div>
        <div id="lock-wrapper" class="items-wrapper !hidden">
          <div id="lockPrivate" class="item-lock" data-type="PRIVATE"></div>
          <div id="lockProtected" class="item-lock" data-type="PROTECTED"></div>
          <div id="lockPublic" class="item-lock" data-type="PUBLIC"></div>
        </div>
      </div>
    </div>
    <div class="btns-container" type="submit" name="submit" id="submit">
      <div class="ai-split-wrapper">
        <button id="ai_optimize" class="action-btn ai-btn ai-main-btn" title="">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-img ai-icon-normal">
            <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72"/>
            <path d="m14 7 3 3"/>
            <path d="M5 6v4"/>
            <path d="M19 14v4"/>
            <path d="M10 2v2"/>
            <path d="M7 8H3"/>
            <path d="M21 16h-4"/>
            <path d="M11 3H9"/>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-img ai-icon-loading">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </button>
        <button id="ai_quick_toggle" class="action-btn ai-btn ai-quick-toggle" title="">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="icon-img">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div id="ai_quick_menu" class="ai-quick-menu hidden"></div>
      </div>
      <button id="content_submit_text" class="action-btn confirm-btn"><img class="icon-img" src="assets/logo_24x24.png"></button>
    </div>
  </div>
  <div class="tag-list" id="taglist"></div>
  <div class="shortcut-list" id="shortcutlist"></div>
  <div class="tag-hide" id="taghide">
    <input
    id="hideInput"
    class="inputer"
    name="hideInput"
    type="text"
    value=""
    maxlength="50"
    placeholder=""
  />
    <input
    id="showInput"
    class="inputer"
    name="showInput"
    type="text"
    value=""
    maxlength="50"
    placeholder=""
  />
  <span id="saveTag" class="action-btn confirm-btn"></span>
  </div>

  <div class="" id="randomlist"></div>

  <input type="file" id="inFile" style="display:none;">

  <script src="js/i18n.js"></script>
  <script src="js/jquery.min.js"></script>
  <script src="js/message.js"></script>
  <script src="js/llm-config.js"></script>
  <script src="js/dayjs.min.js"></script>
  <script src="js/zh-cn.js"></script>
  <script src="js/relativeTime.js"></script>
  <script src="js/view-image.js"></script>
  <script src="js/theme-lang.js"></script>
  <script src="js/ai-optimize.js"></script>
  <script src="js/memos-api.js"></script>
  <script src="js/oper.js"></script>
  </body>
</html>
